services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-prod}
    environment:
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - EMAIL_FROM=${EMAIL_FROM:-sender@example.com}
      - EMAIL_TO=${EMAIL_TO:-recipient@example.com}
      - USER_NAME=${USER_NAME:-John Doe}
      - MESSAGE=${MESSAGE:-Welcome to our platform!}
    depends_on:
      - mailpit
